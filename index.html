<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resource Moved</title>

<!-- Auto Redirect after 10 seconds -->
<meta http-equiv="refresh" content="10;url=https://dibakardas.in/resources">

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#0b1225;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    text-align:center;
}

.container {
    max-width:520px;
    padding:40px;
}

h1 {
    color:#d4a82a;
    margin-bottom:20px;
}

p {
    color:#ccc;
    font-size:16px;
    line-height:1.6;
}

.countdown {
    margin-top:15px;
    font-size:14px;
    color:#aaa;
}

a {
    display:inline-block;
    margin-top:25px;
    padding:12px 22px;
    background:#d4a82a;
    color:#000;
    text-decoration:none;
    font-weight:bold;
    border-radius:6px;
    transition:0.2s;
}

a:hover {
    background:#f5cc50;
}
</style>
</head>

<body>

<div class="container">
    <h1>Resource Moved</h1>

    <p>
        This training material has been moved to our official website.
    </p>

    <p>
        Please visit <strong>dibakardas.in</strong> and click on the <strong>Resources</strong> section to access it.
    </p>

    <div class="countdown">
        Redirecting automatically in <span id="timer">10</span> seconds...
    </div>

    <a href="https://dibakardas.in">
        Go Now
    </a>
</div>

<script>
let timeLeft = 10;
const timerEl = document.getElementById("timer");

setInterval(() => {
    timeLeft--;
    if (timeLeft >= 0) {
        timerEl.textContent = timeLeft;
    }
}, 1000);
</script>

</body>
</html>
